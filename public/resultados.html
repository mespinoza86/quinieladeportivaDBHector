<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Agregar Resultados por Jugador</title>

  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/resultados.js" defer></script>
</head>

<body class="app-body">

  <main class="mobile-shell wide-shell">
    <section class="hero-card">
      <div class="hero-top">
        <div>
          <p class="eyebrow">Administración</p>
          <h1>Agregar Resultados</h1>
        </div>
        <div class="app-logo">🎯</div>
      </div>

      <p class="hero-text">
        Selecciona un jugador y una jornada para agregar o modificar sus pronósticos.
      </p>
    </section>

    <section id="resultadosSection" class="app-panel">
      <h2>Resultados por Jugador</h2>

      <div class="two-column">
        <div>
          <label for="jugadorSelect" class="field-label">Jugador</label>
          <select id="jugadorSelect"></select>
        </div>

        <div>
          <label for="jornadaSelect" class="field-label">Jornada</label>
          <select id="jornadaSelect"></select>
        </div>
      </div>

      <div class="button-grid">
        <button id="addResultadosButton" type="button">
          Agregar Resultados
        </button>

        <button id="pegarResultadosButton" type="button" class="secondary-button">
          Pegar Resultados
        </button>
      </div>

      <div id="partidosContainer" class="matches-container"></div>

      <div class="button-stack">
        <button id="saveResultadosButton" type="button">
          Guardar Resultados
        </button>

        <button onclick="window.location.href='adminmode.html'" class="ghost-button" type="button">
          Volver
        </button>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <a href="index.html">🏠<span>Inicio</span></a>
    <a href="ver_jornadas.html">📅<span>Jornadas</span></a>
    <a href="resultados-totales.html">🏆<span>Tabla</span></a>
    <a href="adminmode.html" class="active">⚙️<span>Admin</span></a>
  </nav>

</body>
</html>
