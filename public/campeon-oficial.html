<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campeón Oficial</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="/js/campeon-oficial.js" defer></script>
</head>

<body class="app-body">
  <main class="mobile-shell">

    <section class="hero-card">
      <div class="hero-top">
        <div>
          <p class="eyebrow">ADMINISTRADOR</p>
          <h1>Campeón Oficial</h1>
        </div>
        <div class="app-logo">🏆</div>
      </div>

      <p class="hero-text">
        Selecciona el campeón mundial oficial. El sistema asignará 20 puntos a quienes lo hayan acertado.
      </p>
    </section>

    <section class="app-panel">
      <h2>Definir campeón</h2>

      <label for="campeonSelect" class="field-label">Campeón oficial</label>
      <select id="campeonSelect"></select>

      <div class="button-grid">
        <button onclick="window.location.href='adminmode.html'" class="secondary-button">
          Volver
        </button>

        <button id="guardarBtn">
          Guardar
        </button>
      </div>

      <p id="mensaje"></p>
    </section>

    <section class="app-panel">
      <h2>Pronósticos registrados</h2>

      <div class="list-card table-scroll">
        <table class="app-table campeon-table">
          <thead>
            <tr>
              <th>Jugador</th>
              <th>Campeón elegido</th>
            </tr>
          </thead>
          <tbody id="tablaPronosticos"></tbody>
        </table>
      </div>
    </section>

  </main>

  <nav class="bottom-nav">
    <a href="adminmode.html" class="active">
      <span>Admin</span>
    </a>
    <a href="jornadas.html">
      <span>Jornadas</span>
    </a>
    <a href="agregar-resultados-oficiales.html">
      <span>Oficiales</span>
    </a>
    <a href="resultados-totales.html">
      <span>Tabla</span>
    </a>
  </nav>
</body>
</html>
