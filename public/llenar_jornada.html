<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Llenar Jornada</title>

  <link rel="stylesheet" href="/css/styles.css" />
  <script src="/js/llenar_jornada_user.js" defer></script>
</head>

<body class="app-body">

  <div id="modalPassword" class="modal-overlay" style="display:none;">
    <div class="modal-card">
      <div class="modal-icon">🔒</div>
      <h2>Validar jugador</h2>
      <p>Ingrese la contraseña del jugador:</p>

      <input type="password" id="inputPassword" placeholder="Contraseña" />

      <div class="button-grid">
        <button id="btnPasswordOk">Aceptar</button>
        <button id="btnPasswordCancel" class="secondary-button">Cancelar</button>
      </div>
    </div>
  </div>

  <main class="mobile-shell">

    <section class="hero-card">
      <div class="hero-top">
        <div>
          <p class="eyebrow">Pronósticos</p>
          <h1>Llenar Jornada</h1>
        </div>
        <div class="app-logo">📝</div>
      </div>

      <p class="hero-text">
        Selecciona tu nombre, llena tus marcadores y guarda la quiniela antes del cierre.
      </p>
    </section>

    <section id="llenarJornadaSection" class="app-panel">
      <div class="section-title-row">
        <div>
          <h2>Partidos de la jornada</h2>
          <p class="helper-text">Los partidos en negrita son comodines.</p>
        </div>
      </div>

      <div id="infoCierreContainer" class="info-card"></div>

      <div class="input-group">
        <label for="comboJugadores" class="field-label">Nombre del jugador</label>
        <select id="comboJugadores">
          <option value="">Cargando jugadores...</option>
        </select>
      </div>

      <div id="partidosContainer" class="matches-container"></div>

      <div class="button-stack">
        <button id="guardarResultadosButton">Guardar Resultados</button>
        <button id="copiarTextoButton" class="secondary-button">Copiar en Texto</button>
        <button id="enviarWhatsappButton" class="secondary-button">Enviar por WhatsApp</button>
        <button onclick="window.location.href='ver_jornadas.html'" class="ghost-button">Volver</button>
      </div>
    </section>

  </main>

  <nav class="bottom-nav">
  <a href="index.html" class="active">
    🏠
    <span>Inicio</span>
  </a>

  <a href="ver_jornadas.html">
    📅
    <span>Jornadas</span>
  </a>

  <a href="reglamento_quiniela.html">
    📜
    <span>Reglamento</span>
  </a>

  <a href="resultados-totales.html">
    🏆
    <span>Tabla</span>
  </a>
</nav>



</body>
</html>
