<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Resultados Totales</title>

  <link rel="stylesheet" href="/css/styles.css" />
  <script defer src="/js/resultados-totales.js"></script>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      setTimeout(() => {
        const boton = document.getElementById("calcularResultados");
        if (boton) boton.click();
      }, 500);
    });
  </script>
</head>

<body class="app-body">

  <main class="mobile-shell wide-shell">

    <section class="hero-card">
      <div class="hero-top">
        <div>
          <p class="eyebrow">Clasificación</p>
          <h1>Tabla General</h1>
        </div>
        <div class="app-logo">🏆</div>
      </div>

      <p class="hero-text">
        Consulta el acumulado de puntos por jugador y los resultados por jornada.
      </p>
    </section>

    <section class="app-panel">
      <div class="section-title-row">
        <div>
          <h2>Resultados totales</h2>
          <p class="helper-text">
            En computadora verás la tabla completa. En celular se muestra una vista optimizada.
          </p>
        </div>
      </div>

      <button id="calcularResultados" type="button">
        Calcular Resultados
      </button>

      <div id="tablaContainer" class="tabla-contenedor">
        <table id="resultadosTotalesTable">
          <thead>
            <tr>
              <th>Jugador</th>
            </tr>
          </thead>

          <tbody></tbody>
        </table>
      </div>

      <div id="mobileResultadosContainer" class="mobile-results-list"></div>

      <button id="volverButton" class="ghost-button" type="button">
        Volver
      </button>
    </section>

  </main>

    <nav class="bottom-nav">
  <a href="index.html" class="active">
    🏠
    <span>Inicio</span>
  </a>

  <a href="ver_jornadas.html">
    📅
    <span>Jornadas</span>
  </a>

  <a href="reglamento_quiniela.html">
    📜
    <span>Reglamento</span>
  </a>

  <a href="resultados-totales.html">
    🏆
    <span>Tabla</span>
  </a>
</nav>



  <script>
    document.getElementById("volverButton").addEventListener("click", () => {
      window.location.href = "index.html";
    });

    function crearVistaMovilResultados() {
      const table = document.getElementById("resultadosTotalesTable");
      const mobileContainer = document.getElementById("mobileResultadosContainer");

      if (!table || !mobileContainer) return;

      const headers = Array.from(table.querySelectorAll("thead th")).map(th =>
        th.textContent.trim()
      );

      const rows = Array.from(table.querySelectorAll("tbody tr"));

      if (headers.length < 2 || rows.length === 0) return;

      mobileContainer.innerHTML = "";

      rows.forEach(row => {
        const cells = Array.from(row.querySelectorAll("td"));

        if (cells.length === 0) return;

        const jugador = cells[0]?.textContent.trim() || "";
        const total = cells[cells.length - 1]?.textContent.trim() || "0";

        const card = document.createElement("div");
        card.className = "mobile-result-card";

        let jornadasHTML = "";

        for (let i = 1; i < cells.length - 1; i++) {
          jornadasHTML += `
            <div class="mobile-result-row">
              <span>${headers[i]}</span>
              <strong>${cells[i].textContent.trim()}</strong>
            </div>
          `;
        }

        card.innerHTML = `
          <div class="mobile-result-header">
            <h3>${jugador}</h3>

            <div class="mobile-total">
              <span>Total</span>
              <strong>${total}</strong>
            </div>
          </div>

          <div class="mobile-jornadas">
            ${jornadasHTML}
          </div>
        `;

        mobileContainer.appendChild(card);
      });
    }

    window.addEventListener("DOMContentLoaded", () => {
      setTimeout(() => {
        crearVistaMovilResultados();
      }, 1200);
    });

    document.addEventListener("click", event => {
      if (event.target && event.target.id === "calcularResultados") {
        setTimeout(() => {
          crearVistaMovilResultados();
        }, 800);
      }
    });
  </script>

</body>
</html>
