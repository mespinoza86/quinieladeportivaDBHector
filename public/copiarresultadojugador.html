<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copiar Resultado Jugador</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="/js/copiarresultadojugador.js" defer></script>
</head>

<body class="app-body">
  <main class="mobile-shell">
    <section class="hero-card">
      <div class="hero-top">
        <div>
          <p class="eyebrow">Compartir</p>
          <h1>Resultado por Jugador</h1>
        </div>
        <div class="app-logo">📋</div>
      </div>
      <p class="hero-text">Copia o envía por WhatsApp los pronósticos de un jugador.</p>
    </section>

    <section class="app-panel">
      <h2>Selecciona Jornada y Jugador</h2>

      <label for="jornadaSelect" class="field-label">Jornada</label>
      <select id="jornadaSelect"></select>

      <label for="jugadorSelect" class="field-label">Jugador</label>
      <select id="jugadorSelect"></select>

      <div class="button-stack">
        <button id="copiarResultadosButton">Copiar Resultados</button>
        <button id="enviarWhatsappButton" class="secondary-button">Enviar por WhatsApp</button>
        <button onclick="window.location.href='adminmode.html'" class="ghost-button">Volver</button>
      </div>

      <textarea id="resultadoTexto" rows="10" placeholder="Aquí aparecerá el texto generado..."></textarea>
    </section>
  </main>

  <nav class="bottom-nav">
    <a href="index.html">🏠<span>Inicio</span></a>
    <a href="ver_jornadas.html">📅<span>Jornadas</span></a>
    <a href="resultados-totales.html">🏆<span>Tabla</span></a>
    <a href="adminmode.html" class="active">⚙️<span>Admin</span></a>
  </nav>
</body>
</html>
