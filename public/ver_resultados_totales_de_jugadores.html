<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Resultados Totales de Jugadores</title>

  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/ver_resultados_totales_de_jugadores.js" defer></script>
</head>

<body class="app-body">

  <main class="mobile-shell wide-shell">

    <section class="hero-card">
      <div class="hero-top">
        <div>
          <p class="eyebrow">Resultados por jornada</p>
          <h1>Totales de Jugadores</h1>
        </div>

        <div class="app-logo">📈</div>
      </div>

      <p class="hero-text">
        Selecciona una jornada para ver los pronósticos, resultados oficiales y puntos obtenidos.
      </p>
    </section>

    <section class="app-panel">

      <button id="volver-btn-top" class="ghost-button" type="button" style="display:none;">
        Volver al Inicio
      </button>

      <label for="jornada-select" class="field-label">Seleccionar Jornada</label>
      <select id="jornada-select"></select>

      <button id="ver-resultados-btn" type="button">
        Ver Resultados
      </button>

      <div class="tabla-contenedor">
        <table id="tabla-resultados">
          <thead>
            <tr>
              <th>Jugador</th>
              <th>Resultados Pronosticados</th>
              <th>Resultados Oficiales</th>
              <th>Puntos Obtenidos</th>
            </tr>
          </thead>

          <tbody></tbody>
        </table>
      </div>

      <button id="volver-btn-bottom" class="ghost-button" type="button" style="display:none;">
        Volver al Inicio
      </button>

    </section>

  </main>

  <nav class="bottom-nav">
  <a href="index.html" class="active">
    🏠
    <span>Inicio</span>
  </a>

  <a href="ver_jornadas.html">

    <span>Reglamento</span>
  </a>

  <a href="resultados-totales.html">
    🏆
    <span>Tabla</span>
  </a>
</nav>

</html>
