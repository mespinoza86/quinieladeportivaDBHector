<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Resultados Pronosticados por Jugador</title>

  <link rel="stylesheet" href="css/styles.css" />

  <!-- ESTE ES EL NOMBRE REAL DE TU JS -->
  <script src="js/ver-resultados_puntos.js" defer></script>
</head>

<body class="app-body">

  <!-- ESTOS IDs SON LOS QUE USA TU JS -->
  <div id="passwordModal" class="modal-overlay" style="display:none;">
    <div class="modal-card">
      <div class="modal-icon">🔒</div>

      <h2>Jornada aún no ha cerrado</h2>
      <p>Introduce la contraseña:</p>

      <input type="password" id="passwordInput" placeholder="Contraseña" />

      <div class="button-grid">
        <button id="passwordOk">Aceptar</button>
        <button id="passwordCancel" class="secondary-button">Cancelar</button>
      </div>
    </div>
  </div>

  <main class="mobile-shell wide-shell">
    <section class="hero-card">
      <div class="hero-top">
        <div>
          <p class="eyebrow">Puntaje</p>
          <h1>Pronósticos con Puntos</h1>
        </div>
        <div class="app-logo">🏅</div>
      </div>

      <p class="hero-text">
        Consulta los pronósticos, los puntos por partido y el total obtenido.
      </p>
    </section>

    <section id="verResultadosSection" class="app-panel">
      <form id="verResultadosForm">
        <h2>Buscar Resultados</h2>

        <div class="two-column">
          <div>
            <label for="jugadorSelect" class="field-label">Jugador</label>
            <select id="jugadorSelect"></select>
          </div>

          <div>
            <label for="jornadaSelect" class="field-label">Jornada</label>
            <select id="jornadaSelect"></select>
          </div>
        </div>

        <!-- ESTE ID ES EL QUE USA TU JS -->
        <button id="searchResultadosButtonpuntos" type="button">
          Buscar Resultados
        </button>

        <!-- ESTOS 3 CONTENEDORES LOS USA TU JS -->
        <div id="resultadosContainer" class="matches-container"></div>
        <div id="puntosContainer" class="matches-container"></div>
        <div id="totalPuntosContainer" class="info-card"></div>
      </form>

      <button onclick="window.location.href='index.html'" class="ghost-button">
        Volver
      </button>
    </section>
  </main>

  <nav class="bottom-nav">
  <a href="index.html" class="active">
    🏠
    <span>Inicio</span>
  </a>

  <a href="ver_jornadas.html">
    📅
    <span>Jornadas</span>
  </a>

  <a href="reglamento_quiniela.html">
    📜
    <span>Reglamento</span>
  </a>

  <a href="resultados-totales.html">
    🏆
    <span>Tabla</span>
  </a>
</nav>


</body>
</html>
